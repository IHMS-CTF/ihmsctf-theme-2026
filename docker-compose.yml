services:
  ihmsctftheme:
    build: .
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      SESSION_COOKIE_SECURE: "true"
      SESSION_COOKIE_SAMESITE: "Lax"
      CTFD_HOST: "${CTFD_HOST:-https://demo.ctfd.io}"
    restart: unless-stopped
